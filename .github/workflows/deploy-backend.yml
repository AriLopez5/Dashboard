name: Deploy Backend Lambdas to AWS

on:
  push:
    branches:
      - main
    paths:
      - 'backend/lambdas/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:
    inputs:
      only_function:
        description: 'Nombre de carpeta Lambda a desplegar (opcional, ej: crear-gasto)'
        required: false
        type: string
      aws_function_name:
        description: 'Nombre EXACTO de la función en AWS (opcional, recomendado para despliegue puntual)'
        required: false
        type: string
      dry_run:
        description: 'Si es true, solo valida y lista Lambdas sin desplegar'
        required: false
        type: boolean
        default: false

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-north-1
      LAMBDA_FUNCTION_PREFIX: ${{ vars.LAMBDA_FUNCTION_PREFIX }}
      ONLY_FUNCTION: ${{ github.event.inputs.only_function }}
      AWS_FUNCTION_NAME: ${{ github.event.inputs.aws_function_name }}
      DRY_RUN: ${{ github.event.inputs.dry_run }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v5

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validar carpeta de lambdas
        run: |
          test -d backend/lambdas || { echo "No existe backend/lambdas"; exit 1; }

      - name: Desplegar funciones Lambda
        shell: bash
        run: |
          set -euo pipefail

          shopt -s nullglob

          declare -a DIRS=()
          if [[ -n "${ONLY_FUNCTION:-}" ]]; then
            if [[ -d "backend/lambdas/${ONLY_FUNCTION}" ]]; then
              DIRS+=("backend/lambdas/${ONLY_FUNCTION}")
            else
              echo "La función '${ONLY_FUNCTION}' no existe en backend/lambdas"
              exit 1
            fi
          else
            for dir in backend/lambdas/*; do
              [[ -d "$dir" ]] && DIRS+=("$dir")
            done
          fi

          if [[ ${#DIRS[@]} -eq 0 ]]; then
            echo "No se encontraron lambdas para desplegar"
            exit 1
          fi

          mapfile -t AWS_FUNCTIONS < <(aws lambda list-functions --query 'Functions[].FunctionName' --output text | tr '\t' '\n')

          echo "Funciones detectadas:"
          for dir in "${DIRS[@]}"; do
            echo "- $(basename "$dir")"
          done

          if [[ "${DRY_RUN:-false}" == "true" ]]; then
            echo "DRY RUN activado: no se subirá código"
            exit 0
          fi

          failed=0
          for dir in "${DIRS[@]}"; do
            name="$(basename "$dir")"
            zip_path="/tmp/${name}.zip"

            name_dash="${name//_/-}"
            name_underscore="${name//-/_}"

            declare -a CANDIDATES=(
              "${LAMBDA_FUNCTION_PREFIX}${name}"
              "${LAMBDA_FUNCTION_PREFIX}${name_dash}"
              "${LAMBDA_FUNCTION_PREFIX}${name_underscore}"
              "${name}"
              "${name_dash}"
              "${name_underscore}"
            )

            function_name=""

            if [[ -n "${AWS_FUNCTION_NAME:-}" ]]; then
              if aws lambda get-function --function-name "${AWS_FUNCTION_NAME}" > /dev/null 2>&1; then
                function_name="${AWS_FUNCTION_NAME}"
              else
                echo "ERROR: La función AWS_FUNCTION_NAME='${AWS_FUNCTION_NAME}' no existe o no es accesible"
                failed=1
                continue
              fi
            fi

            for candidate in "${CANDIDATES[@]}"; do
              [[ -n "$function_name" ]] && break
              if aws lambda get-function --function-name "$candidate" > /dev/null 2>&1; then
                function_name="$candidate"
                break
              fi
            done

            if [[ -z "$function_name" ]]; then
              target_norm="$(echo "${name}" | tr '[:upper:]' '[:lower:]' | tr -cd '[:alnum:]')"
              target_sing="${target_norm%s}"

              for aws_fn in "${AWS_FUNCTIONS[@]}"; do
                fn_norm="$(echo "${aws_fn}" | tr '[:upper:]' '[:lower:]' | tr -cd '[:alnum:]')"
                fn_sing="${fn_norm%s}"

                if [[ "$fn_norm" == "$target_norm" || "$fn_norm" == "$target_sing" || "$fn_sing" == "$target_norm" || "$fn_sing" == "$target_sing" ]]; then
                  function_name="$aws_fn"
                  break
                fi

                if [[ "$fn_norm" == *"$target_norm" || "$fn_norm" == *"$target_sing" || "$target_norm" == *"$fn_norm" || "$target_sing" == *"$fn_sing" ]]; then
                  function_name="$aws_fn"
                  break
                fi
              done
            fi

            if [[ -z "$function_name" ]]; then
              echo "ERROR: No se encontró Lambda para carpeta '${name}'"
              echo "Candidatos probados: ${CANDIDATES[*]}"
              failed=1
              continue
            fi

            echo "Empaquetando ${name}..."
            (
              cd "$dir"
              zip -rq "$zip_path" . -x "__pycache__/*" "*.pyc" "*.pyo" ".DS_Store"
            )

            echo "Desplegando ${function_name}..."
            if aws lambda update-function-code \
              --function-name "$function_name" \
              --zip-file "fileb://$zip_path" \
              --publish > /dev/null; then
              echo "OK: ${function_name}"
              aws lambda get-function \
                --function-name "$function_name" \
                --query 'Configuration.[FunctionName,Version,LastModified]' \
                --output text
            else
              echo "ERROR: ${function_name}"
              failed=1
            fi
          done

          if [[ $failed -ne 0 ]]; then
            echo "Una o más funciones fallaron en despliegue"
            exit 1
          fi

          echo "Despliegue backend completado"
